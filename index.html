<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudu ❤️</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#0f0f0f;
  color:#fff;
  text-align:center;
  overflow:hidden;
}

.container {
  padding:50px 25px;
}

h1 {
  font-weight:500;
  letter-spacing:1px;
}

p {
  opacity:0;
  animation:fade 2s forwards;
}

.delay1 { animation-delay:2s; }
.delay2 { animation-delay:4s; }

button {
  margin-top:30px;
  padding:10px 22px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  font-size:15px;
  opacity:0;
  animation:fade 2s forwards;
  animation-delay:6s;
}

#final {
  display:none;
  margin-top:30px;
  line-height:1.8;
  font-size:17px;
  opacity:0;
}

@keyframes fade {
  to { opacity:1; }
}

.heart {
  position:fixed;
  bottom:-10px;
  font-size:14px;
  animation:floatUp 7s linear infinite;
  opacity:0.7;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:0.7;}
  100% { transform:translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>Sudu ❤️</h1>

  <p class="delay1">I miss you, baby.</p>
  <p class="delay2">I’m really sorry.</p>

  <button onclick="showFinal()">tap once 🥺</button>

  <div id="final">
