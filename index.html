<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudu ❤️</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  text-align:center;
  background:white;
  color:#222;
  overflow:hidden;
}

.container {
  padding:40px;
}

.heart {
  position:fixed;
  bottom:-10px;
  font-size:18px;
  animation:floatUp 6s linear infinite;
  color:#ff4d6d;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:1;}
  100% { transform:translateY(-100vh); opacity:0;}
}

button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#ff4d6d;
  color:white;
  font-size:15px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title"></h1>
  <p id="line1"></p>
  <p id="line2"></p>

  <button id="btn" onclick="showFinal()" style="display:none;">
    tap once 🥺
  </button>

  <div id="finalMsg" style="display:none; margin-top:30px; line-height:1.8;">
    I’m really sorry.<br><br>
    I’ll be better for you.<br><br>
    I’ll take care of you the way you deserve.<br><br>
    I won’t let you feel sad again… I promise.<br><br>
    You are my life, Sudu.<br><br>
    It’s you and me… always.
  </div>
</div>

<script>
const title = "Sudu ❤️";
const text1 = "I miss you, baby.";
const text2 = "I hate that you're hurt because of me.";

function typeWriter(text, element, speed, callback) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else if (callback) {
      setTimeout(callback, 800);
    }
  }
  typing();
}

window.onload = () => {
  typeWriter(title, document.getElementById("title"), 80, () => {
    typeWriter(text1, document.getElementById("line1"), 50, () => {
      typeWriter(text2, document.getElementById("line2"), 50, () => {
        document.getElementById("btn").style.display = "inline-block";
      });
    });
  });

  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.innerHTML = "❤️";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 400);
};

function showFinal() {
  document.getElementById("finalMsg").style.display = "block";
}
</script>

</body>
</html>
